version: "3.8"

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: truva-postgres
    environment:
      POSTGRES_DB: truva
      POSTGRES_USER: truva
      POSTGRES_PASSWORD: truva_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truva -d truva"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: truva-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Reputation engine
  engine:
    build:
      context: ./backend/reputation-engine
      dockerfile: Dockerfile
    container_name: truva-engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "3001"
      NODE_ENV: development
      DATABASE_URL: postgresql://truva:truva_dev_password@postgres:5432/truva
      REDIS_URL: redis://redis:6379
      SOLANA_RPC_URL: https://api.devnet.solana.com
      TRUVA_PROGRAM_ID: TRSTgateXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX
    ports:
      - "3001:3001"
    volumes:
      - ./backend/reputation-engine/src:/app/src
    restart: unless-stopped

volumes:
  postgres_data:
