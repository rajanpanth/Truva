name: Truva CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # TypeScript compilation checks
  typecheck:
    name: TypeScript Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install reputation engine dependencies
        run: cd backend/reputation-engine && npm install

      - name: Install SDK dependencies
        run: cd sdk && npm install

      - name: Typecheck reputation engine
        run: cd backend/reputation-engine && npx tsc --noEmit

      - name: Typecheck SDK
        run: cd sdk && npx tsc --noEmit

  # Anchor program build
  anchor-build:
    name: Anchor Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor-cli@0.30.1

      - name: Install dependencies
        run: npm install

      - name: Build Anchor program
        run: anchor build

  # Frontend build
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd app && npm install

      - name: Build frontend
        run: cd app && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder_key"

  # DB migration dry-run (TypeScript compilation only — no live DB needed)
  db-migrations:
    name: DB Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install reputation engine dependencies
        run: cd backend/reputation-engine && npm install

      - name: Typecheck migration runner
        run: cd backend/reputation-engine && npx tsc --noEmit

      - name: Lint migration SQL files
        run: |
          # Fail if any migration file is missing an UP statement
          for f in backend/reputation-engine/src/db/migrations/*.sql; do
            if ! grep -qiE "(CREATE|ALTER|INSERT)" "$f"; then
              echo "Migration $f appears empty or invalid"
              exit 1
            fi
          done
          echo "All migration files look valid"

  # Reputation engine unit tests (no DB needed — pure functions)
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install reputation engine dependencies
        run: cd backend/reputation-engine && npm install

      - name: Run scorer unit tests
        run: cd backend/reputation-engine && npm run test:scorer

  # SDK unit tests
  sdk-tests:
    name: SDK Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install SDK dependencies
        run: cd sdk && npm install

      - name: Run SDK tests
        run: cd sdk && npm test
